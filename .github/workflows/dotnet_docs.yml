---
name: dotnet docs
on:
  workflow_run:
    workflows: [ "dotnet test" ]
    types:
      - completed
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write

env:
  BASE_PATH: back/docs

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: docs-${{ github.ref }}
      cancel-in-progress: true
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate docfx.json
        run: jq empty $BASE_PATH/docfx.json
        continue-on-error: false

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet-env
        with:
          restore: 'false'

      - name: Cache DocFX tool
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-docfx-${{ hashFiles('**/docfx.json') }}
          restore-keys: ${{ runner.os }}-docfx-

      - name: Install DocFX
        run: dotnet tool update -g docfx

      - name: Build Docs
        run: docfx $BASE_PATH/docfx.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: $BASE_PATH/_site
          destination_dir: ${{ github.ref == 'refs/heads/develop' && 'dev' || '' }}
          keep_files: true