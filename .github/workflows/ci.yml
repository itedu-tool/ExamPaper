name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SLN: back/ExamPaper.slnx
  TYPE_BUILD: Release
  VERBOSITY: normal
  BASE_PATH_DOCS: back/docs

jobs:
  dotnet-format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: format-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-dotnet-env
        with:
          restore: 'true'
      - name: Verify formatting
        run: dotnet format ${{ env.SLN }} --verify-no-changes --no-restore

  lint-yaml:
    runs-on: ubuntu-latest
    concurrency:
      group: yamllint-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: yamllint with reviewdog
        uses: reviewdog/action-yamllint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: error
          fail_level: any
          yamllint_flags: '-c .yamllint.yml .github/workflows/ .yamllint.yml'

  lint-markdown:
    runs-on: ubuntu-latest
    concurrency:
      group: markdownlint-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: markdownlint with reviewdog
        uses: reviewdog/action-markdownlint@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: error
          fail_level: any
          markdownlint_flags: '**/*.md --config .markdownlint.json'

  lint-openapi:
    runs-on: ubuntu-latest
    concurrency:
      group: openapi-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli
      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest
      - name: Run Spectral with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          spectral lint back/src/ExamPaper.Api/ExamPaper.Api.json -f text | \
          reviewdog -efm="%f:%l:%c %t%*[^ ] %m" -name="spectral" -reporter=github-pr-review

  test:
    needs: [dotnet-format, lint-yaml, lint-markdown, lint-openapi]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      matrix:
        os: ${{ fromJSON(github.event_name == 'pull_request' && '["ubuntu-latest", "windows-latest"]' || '["ubuntu-latest"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-dotnet-env
        with:
          restore: 'true'
      - name: Build
        run: dotnet build ${{ env.SLN }} --no-restore --configuration ${{ env.TYPE_BUILD }}
      - name: Test
        run: dotnet test ${{ env.SLN }} --no-build --configuration ${{ env.TYPE_BUILD }} --verbosity ${{ env.VERBOSITY }} --logger trx
      - name: Upload test results (optional)
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'

  publish-docs:
    permissions:
      contents: write
    needs: test
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: docs-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet-env
        with:
          restore: 'false'
      - name: Cache DocFX tool
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-docfx-${{ hashFiles('**/docfx.json') }}
          restore-keys: ${{ runner.os }}-docfx-
      - name: Install DocFX
        run: dotnet tool update -g docfx
      - name: Build Docs
        run: docfx ${{ env.BASE_PATH_DOCS }}/docfx.json
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.BASE_PATH_DOCS }}/_site
          destination_dir: ${{ github.ref == 'refs/heads/develop' && 'dev' || '' }}
          keep_files: true
